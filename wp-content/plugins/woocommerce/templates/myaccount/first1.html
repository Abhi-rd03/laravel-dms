<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Increment Decrement</title>

<style>
  body {
    font-family: Arial, sans-serif;
    padding: 30px;
  }

  .counter {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .counter button {
    width: 40px;
    height: 40px;
    font-size: 22px;
    cursor: pointer;
  }

  .counter input {
    width: 60px;
    height: 40px;
    text-align: center;
    font-size: 18px;
  }
</style>
</head>

<body>

<h2>People Count</h2>

<div class="counter">
  <button onclick="decrement()">−</button>
  <input type="text" id="count" value="1" readonly>
  <button onclick="increment()">+</button>
</div>

<script>
  let min = 1;
  let max = 10;

  function increment() {
    let count = document.getElementById("count");
    let value = parseInt(count.value);

    if (value < max) {
      count.value = value + 1;
    }
  }

  function decrement() {
    let count = document.getElementById("count");
    let value = parseInt(count.value);

    if (value > min) {
      count.value = value - 1;
    }
  }
</script>

</body>
</html>
